<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Expedientes</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        /* ----- MODERN MINIMALIST RESET & VARIABLES ----- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-body: #F6F9FC; --bg-surface: #FFFFFF; --bg-surface-soft: #F0F4F8;
            --border-light: #E2E8F0; --border-focus: #3B82F6; --primary: #2563EB;
            --primary-dark: #1E40AF; --primary-soft: #EFF6FF; --text-main: #0F172A;
            --text-muted: #475569; --text-light: #64748B; --success: #10B981;
            --warning: #F59E0B; --danger: #EF4444; --info: #06B6D4; --gray-mid: #6B7280;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.03); --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 12px 24px -8px rgba(0, 0, 0, 0.1); --radius-sm: 8px;
            --radius-md: 12px; --radius-lg: 20px;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --transition: all 0.2s ease;
        }

        body { font-family: var(--font-sans); background-color: var(--bg-body); color: var(--text-main); line-height: 1.5; -webkit-font-smoothing: antialiased; }

        .header { background: var(--bg-surface); border-bottom: 1px solid var(--border-light); padding: 12px 24px; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm); }
        .header-content { display: flex; justify-content: space-between; align-items: center; max-width: 1600px; margin: 0 auto; gap: 16px; }
        .logo { font-size: 1.25rem; font-weight: 600; color: var(--primary); letter-spacing: -0.3px; display: flex; align-items: center; gap: 8px; }

        .container { max-width: 1600px; margin: 0 auto; padding: 28px 24px; }

        .filters-section { background: var(--bg-surface); padding: 20px 24px; border-radius: var(--radius-lg); border: 1px solid var(--border-light); margin-bottom: 32px; box-shadow: var(--shadow-sm); }
        .filters-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 20px; color: var(--text-muted); letter-spacing: -0.2px; text-transform: uppercase; }
        .filter-row, .filter-row-1 { display: flex; flex-wrap: wrap; gap: 16px; width: 100%; }
        .filter-group { flex: 1; min-width: 160px; }
        .filter-label { display: block; font-size: 0.75rem; font-weight: 500; margin-bottom: 6px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; }
        .input, .dropdown { border: 1px solid var(--border-light); border-radius: var(--radius-md); padding: 10px 12px; background-color: var(--bg-surface); color: var(--text-main); font-size: 0.9rem; width: 100%; transition: var(--transition); font-family: var(--font-sans); }
        .input:focus, .dropdown:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        .button { background-color: var(--primary); color: white; border: none; border-radius: var(--radius-md); padding: 8px 18px; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: var(--transition); display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-sans); }
        .button:hover { background-color: var(--primary-dark); transform: translateY(-1px); }
        .button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .button-success { background-color: var(--success); } .button-success:hover:not(:disabled) { background-color: #059669; }
        .button-secondary { background-color: var(--text-light); } .button-secondary:hover:not(:disabled) { background-color: #475569; }
        .button-danger { background-color: var(--danger); } .button-danger:hover:not(:disabled) { background-color: #DC2626; }

        .table-section { background: var(--bg-surface); border-radius: var(--radius-lg); border: 1px solid var(--border-light); overflow: hidden; box-shadow: var(--shadow-sm); }
        .table-title { font-size: 1rem; font-weight: 600; padding: 16px 20px; background: var(--bg-surface-soft); border-bottom: 1px solid var(--border-light); color: var(--text-main); }
        .table-wrap { overflow-x: auto; }
        .data-table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        .data-table th { text-align: left; background-color: var(--bg-surface-soft); font-weight: 600; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); padding: 14px 16px; border-bottom: 1px solid var(--border-light); }
        .data-table td { padding: 14px 16px; border-bottom: 1px solid var(--border-light); color: var(--text-main); font-size: 0.85rem; vertical-align: middle; }
        .data-table tr:hover td { background-color: #F8FAFE; }

        .prioridad-pill { display: inline-block; padding: 4px 10px; border-radius: 40px; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase; background-color: var(--gray-mid); color: white; }
        .prioridad-alta { background-color: var(--danger); } .prioridad-media { background-color: var(--warning); } .prioridad-baja { background-color: var(--success); } .prioridad-ninguna { background-color: var(--text-light); }
        .prioridad-texto { font-size: 0.9rem; font-weight: 600; padding: 8px 14px; border-radius: 40px; margin-bottom: 20px; display: inline-block; }
        .prioridad-texto.alta { background: rgba(239, 68, 68, 0.08); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); } .prioridad-texto.media { background: rgba(245, 158, 11, 0.08); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.2); } .prioridad-texto.baja { background: rgba(16, 185, 129, 0.08); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); } .prioridad-texto.ninguna { background: rgba(100, 116, 139, 0.08); color: var(--text-muted); border: 1px solid rgba(100, 116, 139, 0.2); }

        #paginacion-container { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; margin-top: 24px; background: var(--bg-surface); border-radius: var(--radius-lg); border: 1px solid var(--border-light); }
        .page-info { font-size: 0.85rem; color: var(--text-muted); }

        #modal, #modalVer, #alertModal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(4px); justify-content: center; align-items: center; padding: 20px; z-index: 1000; }
        #modal .content, #modalVer .content, #alertModal .content { background: var(--bg-surface); border-radius: var(--radius-lg); max-width: 980px; width: 100%; max-height: 90vh; display: flex; flex-direction: column; box-shadow: var(--shadow-lg); animation: fadeInUp 0.25s ease; overflow: hidden; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        .modal-header { position: sticky; top: 0; background: var(--bg-surface); border-bottom: 1px solid var(--border-light); padding: 18px 24px; font-size: 1.1rem; font-weight: 600; color: var(--text-main); display: flex; align-items: center; gap: 12px; z-index: 5; }
        .modal-header i { color: var(--primary); font-size: 1.3rem; }
        .modal-body { padding: 24px; overflow-y: auto; flex: 1; }
        .controls-form { background: var(--bg-surface); padding: 16px 24px; border-top: 1px solid var(--border-light); display: flex; gap: 12px; justify-content: flex-end; }

        .field { margin-bottom: 20px; }
        .field label { font-weight: 500; color: var(--text-main); font-size: 0.85rem; margin-bottom: 8px; display: block; }
        #formCausa input, #formCausa textarea, #formCausa select { width: 100%; padding: 10px 12px; border: 1px solid var(--border-light); border-radius: var(--radius-md); font-size: 0.9rem; background: var(--bg-surface); transition: var(--transition); }
        #formCausa input:focus, #formCausa textarea:focus, #formCausa select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.08); }
        .error-message { color: var(--danger); font-size: 0.7rem; margin-top: 4px; display: none; }
        .field.error .error-message { display: block; } .field.error input, .field.error textarea { border-color: var(--danger); background-color: #FEF2F2; }

        .tabs-nav { display: flex; gap: 4px; border-bottom: 1px solid var(--border-light); margin-bottom: 24px; overflow-x: auto; flex-wrap: wrap; }
        .tab-button { background: transparent; border: none; padding: 10px 18px; font-weight: 500; color: var(--text-muted); cursor: pointer; font-size: 0.85rem; border-radius: var(--radius-md) var(--radius-md) 0 0; transition: var(--transition); }
        .tab-button.active { color: var(--primary); background: var(--primary-soft); border-bottom: 2px solid var(--primary); }
        .tab-content { display: none; } .tab-content.active { display: block; }

        #modalVer .modal-body textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--border-light); border-radius: var(--radius-md); font-family: var(--font-sans); font-size: 0.85rem; resize: vertical; min-height: 80px; background: var(--bg-surface); }
        #modalVer .modal-body textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.08); }
        #agregarNota { margin: 20px 0 24px 0; background: var(--bg-surface-soft); padding: 16px; border-radius: var(--radius-md); }
        #agregarNota label { font-weight: 600; margin-bottom: 10px; display: block; color: var(--text-main); }
        .notes-history { max-height: 320px; overflow-y: auto; margin-top: 8px; padding-right: 6px; }
        .note-item { background: var(--bg-surface); border-radius: var(--radius-md); padding: 12px 16px; margin-bottom: 12px; border-left: 3px solid var(--primary); box-shadow: var(--shadow-sm); }
        .note-meta { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 6px; }
        .note-text { font-size: 0.85rem; line-height: 1.4; color: var(--text-main); }
        #cargarMasNotas { margin-top: 12px; width: 100%; justify-content: center; }

        .btn-eliminar-audiencia, .btn-eliminar-diligencia, .btn-eliminar-costas { background: var(--danger); color: white; border: none; border-radius: var(--radius-sm); padding: 6px 12px; cursor: pointer; font-size: 0.75rem; }
        .btn-audiencia, .btn-diligencia { background: var(--success); border: none; padding: 8px 14px; border-radius: var(--radius-md); color: white; cursor: pointer; font-size: 0.8rem; font-weight: 500; margin-top: 8px; }
        .audiencia-item, .diligencia-item, .costas-item { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
        .audiencia-item input, .diligencia-item input, .costas-item input, .costas-item select { flex: 1; min-width: 150px; }
        .editor-toolbar { display: flex; gap: 8px; margin-bottom: 12px; background: var(--bg-surface-soft); border-radius: var(--radius-md); padding: 8px 12px; border: 1px solid var(--border-light); }
        .editor-toolbar button { background: white; border: 1px solid var(--border-light); border-radius: 6px; padding: 6px 12px; cursor: pointer; font-weight: 500; transition: all 0.1s; }
        .editor-toolbar button:hover { background: var(--primary-soft); }
        #observaciones-editor { min-height: 130px; border: 1px solid var(--border-light); border-radius: var(--radius-md); padding: 12px; background: white; line-height: 1.5; }

        .floating-alert { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background-color: var(--danger); color: white; padding: 12px 24px; border-radius: 60px; box-shadow: var(--shadow-md); z-index: 2000; transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1); font-size: 0.85rem; font-weight: 500; backdrop-filter: blur(8px); background-color: rgba(239, 68, 68, 0.95); }
        .floating-alert.success { background-color: rgba(16, 185, 129, 0.95); }
        .floating-alert.show { top: 20px; opacity: 1; visibility: visible; }

        @media (max-width: 768px) {
            .container { padding: 16px; } .filter-group { min-width: 100%; } .header-content { flex-direction: column; align-items: stretch; gap: 12px; } .button { justify-content: center; } .modal-body { padding: 16px; } .tabs-nav { flex-wrap: wrap; } .notes-history { max-height: 260px; }
        }

        @media print {
            .button, .actions, .action-buttons, .controls-form, #btnNuevo, #btnPrintFiltrado,
            .floating-alert, .filters-section, .pagination-container, .tabs-nav, .editor-toolbar { display: none !important; }
            .table-section, .modal .content { box-shadow: none; border: 1px solid #ccc; }
            body { background: white; }
        }
    </style>
</head>
<body>
    <div class="floating-alert" id="floating-alert">
        <i class="fas fa-exclamation-triangle"></i>
        <span id="floating-alert-text"></span>
    </div>
    
    <header class="header">
        <div class="header-content">
            <div class="logo">Base de datos Expedientes</div>
            <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
                <select id="selectorBaseDatos" class="dropdown" style="width: auto; font-weight: bold; background-color: var(--primary-soft); border-color: var(--primary);">
                    <option value="nueva">Activos (nueva base)</option>
                    <option value="historica">Históricos (Anteriores)</option>
                </select>
                <button id="btnNuevo" class="button"><i class="fas fa-plus"></i> Nuevo Expediente</button>
                <button id="btnPrintFiltrado" class="button button-success"><i class="fas fa-print"></i> Exportar Tabla</button>
            </div>
        </div>
    </header>
    
    <main class="container">
        <section class="filters-section">
            <h2 class="filters-title">Filtros de Búsqueda</h2>
            <div class="filter-row">
                <div class="filter-row-1">
                    <div class="filter-group">
                        <label class="filter-label" for="buscador">Búsqueda (Carátula, NNyA, etc.)</label>
                        <div style="display: flex; gap: 8px;">
                            <input type="text" id="buscador" class="input" placeholder="Buscar expediente...">
                            <button id="btnBuscar" class="button" title="Buscar"><i class="fas fa-search"></i></button>
                        </div>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label" for="filtroTipoProceso">Tipo de Proceso</label>
                        <select id="filtroTipoProceso" class="dropdown"><option value="">Tipo de Proceso (todos)</option></select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label" for="filtroIntervencion">Intervención</label>
                        <select id="filtroIntervencion" class="dropdown"><option value="">Intervención (todas)</option></select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label" for="filtroEstado">Estado</label>
                        <select id="filtroEstado" class="dropdown">
                            <option value="">Estado (todos)</option><option>En trámite</option><option>Finalizado</option><option>En Alzada</option><option>Archivado</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label" for="filtroUsuario">Usuario</label>
                        <select id="filtroUsuario" class="dropdown"><option value="">Usuario (todos)</option></select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label" for="filtroPrioridad">Prioridad</label>
                        <select id="filtroPrioridad" class="dropdown">
                            <option value="">Prioridad (todas)</option><option value="Ninguna">Ninguna</option><option value="Baja">Baja</option><option value="Media">Media</option><option value="Alta">Alta</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label" for="filtroCostas">Costas a Favor</label>
                        <select id="filtroCostas" class="dropdown">
                            <option value="">Todos</option>
                            <option value="SI">Sí</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Período</label>
                        <select id="filtroPeriodo" class="dropdown">
                            <option value="90">Últimos 3 meses</option>
                            <option value="180">Últimos 6 meses</option>
                            <option value="365">Último año</option>
                            <option value="todos">Histórico completo</option>
                        </select>
                    </div>
                </div>
            </div>
        </section>
        
        <section class="table-section">
            <h2 class="table-title">Expedientes Judiciales</h2>
            <div class="table-wrap">
                <table class="data-table">
                    <thead>
                        <tr><th>N°</th><th>Carátula</th><th>Tipo</th><th>Juzgado</th><th>Usuario</th><th>Estado</th><th>Prioridad</th><th>Registro</th><th>Eventos</th><th class="no-print">Acciones</th></tr>
                    </thead>
                    <tbody id="tbodyCausas">
                        <tr><td colspan="10">Cargando expedientes...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
        <div id="paginacion-container"></div>
    </main>

    <div id="modal"><div class="content"><div class="modal-header"><i class="fa-solid fa-file-pen"></i><h2 id="tituloForm" style="margin:0;">Nuevo Expediente</h2></div><div class="modal-body"><form id="formCausa" action="#" method="post"><input type="hidden" id="editId" /><div class="tabs-container"><div class="tabs-nav"><button type="button" class="tab-button active" data-tab="tab1">Datos Principales</button><button type="button" class="tab-button" data-tab="tab2">Fechas</button><button type="button" class="tab-button" data-tab="tab3">Audiencias</button><button type="button" class="tab-button" data-tab="tab4">Vencimientos</button><button type="button" class="tab-button" data-tab="tab5">Diligencias</button><button type="button" class="tab-button" data-tab="tab6">Recursos</button><button type="button" class="tab-button" data-tab="tab7">Costas</button><button type="button" class="tab-button" data-tab="tab8">Observaciones</button></div><div id="tab1" class="tab-content active"><div class="field"><label for="numCausa">N° Expediente *</label><input id="numCausa" required autocomplete="off" /><span class="error-message">Este campo es obligatorio.</span></div><div class="field"><label for="caratula">Carátula Completa *</label><textarea id="caratula" rows="2" required></textarea></div><div class="field"><label for="tipoProceso">Tipo de Proceso *</label><select id="tipoProceso" required></select></div><div class="field"><label for="juzgado">Juzgado *</label><select id="juzgado" required></select></div><div class="field"><label for="prioridad">Prioridad *</label><select id="prioridad" required><option value="Ninguna">Ninguna</option><option value="Baja">Baja</option><option value="Media">Media</option><option value="Alta">Alta</option></select></div><div class="field"><label for="usuarioAsignado">Usuario Asignado *</label><select id="usuarioAsignado" required></select></div><div class="field"><label for="estado">Estado del Proceso</label><select id="estado"><option>En trámite</option><option>Finalizado</option><option>Archivado</option><option>En Alzada</option></select></div><div class="field"><label for="intervencion">Intervención</label><select id="intervencion"><option>Defensor Oficial</option><option>Ministerio Principal</option><option>Ministerio Complementario</option><option>Patrocinante Actor</option><option>Patrocinante Demandado</option><option>Patrocinante Tercero</option><option value="Defensor de Ausente">Defensor de Ausente</option><option>Patrocinante presunto incapaz</option><option value="Defensor Oficial Asesor Letrado">Asistencia Letrada del incapaz</option><option>Ministerio Público del incapaz</option><option>Ministerio Público en turno Abril</option><option>Ministerio Público en turno Agosto</option><option>Ministerio Público en turno Diciembre</option><option>Tutor Ad Litem</option><option>Defensor Oficial Art 329 CPCC</option><option>Defensor Oficial Art 626 CPCC</option></select></div><div class="field"><label for="datosNnya">Datos de NNyA (máx. 500 palabras)</label><textarea id="datosNnya"></textarea><div class="counter" id="counterNnya" style="display:none">0/500</div></div></div><div id="tab2" class="tab-content"><div class="field"><label for="fechaInicio">Fecha de Inicio</label><input type="date" id="fechaInicio" /></div><div class="field"><label for="fechaPase">Fecha de Pase</label><input type="datetime-local" id="fechaPase" step="60" /></div></div><div id="tab3" class="tab-content"><div class="field"><label for="audiencias">Audiencias señaladas</label><div id="audiencias-container" class="audiencias-container"></div><button type="button" id="btnAgregarAudiencia" class="btn-audiencia"><i class="fa fa-plus"></i> Agregar Audiencia</button></div><div class="field"><label for="audienciaGesell">Audiencia en Cámara Gesell</label><div style="display:flex;align-items:center;gap:8px"><input type="checkbox" id="habilitarAudienciaGesell" /><span>Habilitar</span></div><input type="datetime-local" id="audienciaGesell" step="60" disabled /></div><div class="field"><label for="nnyaGesell">NNyA en Gesell (máx. 400 palabras)</label><textarea id="nnyaGesell" disabled></textarea><div class="counter" id="counterNnyaGesell" style="display:none">0/400</div></div></div><div id="tab4" class="tab-content"><div class="field"><label for="vencimiento">Vencimiento</label><input type="datetime-local" id="vencimiento" step="60" /></div><div class="field"><label for="vencimientoRecursos">Vencimiento de Recursos</label><input type="datetime-local" id="vencimientoRecursos" step="60" /></div></div><div id="tab5" class="tab-content"><div class="field"><label for="diligencias">Diligencias</label><div id="diligencias-container" class="diligencias-container"></div><button type="button" id="btnAgregarDiligencia" class="btn-diligencia"><i class="fa fa-plus"></i> Agregar Diligencia</button></div></div><div id="tab6" class="tab-content"><div class="field"><label for="recursos">Recursos Interpuestos</label><select id="recursos"><option value="">Seleccione un recurso</option><option>Apelación</option><option>Queja</option><option>Inconstitucionalidad</option><option>Nulidad</option><option>Reposición</option><option>Aclaratoria</option><option>Recurso Extraordinario</option><option>Recurso de Inaplicabilidad</option></select></div><div id="recursos-opcionales" style="display:none;"><div class="field"><label for="recursosContestacion">Recursos Contestación</label><select id="recursosContestacion"><option value="">Seleccione un recurso</option><option>Apelación</option><option>Queja</option><option>Inconstitucionalidad</option><option>Nulidad</option><option>Reposición</option><option>Aclaratoria</option><option>Recurso Extraordinario</option><option>Recurso de Inaplicabilidad</option></select></div><div class="field"><label for="estadoRecursos">Estado de Recursos</label><select id="estadoRecursos"><option value="">Seleccione un estado</option><option>Pendiente</option><option>En trámite</option><option>Resuelto</option><option>Rechazado</option></select></div></div></div>
            <div id="tab7" class="tab-content">
                <div class="field">

        // ---------- CARGAR CAUSAS CON FILTRO DE USUARIO ----------
        async function cargarCausas(reset = true, direction = null) {
            if (!dbActiva) return;
            tbody.innerHTML = "<tr><td colspan='10'>Cargando...</td></tr>";
            try {
                let baseQuery = dbActiva.collection("causas");
                const fUsuario = filtroUsuario.value;
                const fEstado = filtroEstado.value;
                const fPrioridad = filtroPrioridad.value;
                const fIntervencion = filtroIntervencion.value;
                const fTipoProceso = filtroTipoProceso.value;
                const fCostas = $("filtroCostas").value;
                const periodo = $("filtroPeriodo").value;
                const busqueda = buscador.value.trim().toLowerCase();

                // --- RESTRICCIÓN POR USUARIO (si no es admin) ---
                if (!isAdmin && currentDisplayName) {
                    baseQuery = baseQuery.where("usuarioAsignado", "==", currentDisplayName);
                }

                if (fUsuario && isAdmin) baseQuery = baseQuery.where("usuarioAsignado", "==", fUsuario);
                if (fEstado) baseQuery = baseQuery.where("estado", "==", fEstado);
                if (fPrioridad) baseQuery = baseQuery.where("prioridad", "==", fPrioridad);
                if (fIntervencion) baseQuery = baseQuery.where("intervencion", "==", fIntervencion);
                if (fTipoProceso) baseQuery = baseQuery.where("tipoProceso", "==", fTipoProceso);
                if (fCostas) baseQuery = baseQuery.where("costasFavor", "==", fCostas);

                if (periodo !== "todos") {
                    let fecha = new Date();
                    fecha.setDate(fecha.getDate() - parseInt(periodo));
                    baseQuery = baseQuery.where("fechaRegistro", ">=", firebase.firestore.Timestamp.fromDate(fecha));
                }

                if (busqueda.length >= 3) {
                    const palabra = busqueda.split(/\s+/)[0].normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^\w\s]/gi, '');
                    baseQuery = baseQuery.where("keywords", "array-contains", palabra);
                }

                baseQuery = baseQuery.orderBy("fechaRegistro", "desc");

                if (reset) {
                    currentPage = 1;
                    pageSnapshots = [];
                    lastVisibleDoc = null;
                    const currentFilterKey = getFilterKey();
                    if (cachedTotalCount === null || currentFilterKey !== lastFilterKeys) {
                        try {
                            const snapshotCount = await baseQuery.count().get();
                            totalRecords = snapshotCount.data().count;
                            cachedTotalCount = totalRecords;
                            lastFilterKeys = currentFilterKey;
                        } catch (err) { totalRecords = 0; }
                    } else { totalRecords = cachedTotalCount; }
                    totalPages = Math.ceil(totalRecords / recordsPerPage) || 1;
                }

                let query = baseQuery;
                if (direction === 'next' && lastVisibleDoc) { query = query.startAfter(lastVisibleDoc); currentPage++; }

                query = query.limit(10);
                const snapshot = await query.get();

                if (!snapshot.empty) { lastVisibleDoc = snapshot.docs[snapshot.docs.length - 1]; }

                datosPaginaActual = [];
                snapshot.forEach(doc => { datosPaginaActual.push({ id: doc.id, ...doc.data() }); });

                renderTablas(datosPaginaActual);
                renderPaginacionServerSide();
            } catch (error) {
                console.error(error);
                tbody.innerHTML = "<tr><td colspan='10'>Error al cargar datos</td></tr>";
            }
        }

        function obtenerTodosEventos(causa) { 
            const eventos = []; 
            if (Array.isArray(causa.audiencias)) causa.audiencias.forEach(a => { 
                const f = toDate(a); 
                if (f && !isNaN(f.getTime())) eventos.push({ tipo: "Audiencia", fecha: f, clase: "audiencia" }); 
            }); 
            if (causa.audienciaGesell) { 
                const f = toDate(causa.audienciaGesell); 
                if (f && !isNaN(f.getTime())) eventos.push({ tipo: "Gesell", fecha: f, clase: "gesell" }); 
            } 
            if (causa.vencimiento) { 
                const f = toDate(causa.vencimiento); 
                if (f && !isNaN(f.getTime())) eventos.push({ tipo: "Vencimiento", fecha: f, clase: "vencimiento" }); 
            } 
            if (causa.vencimientoRecursos) { 
                const f = toDate(causa.vencimientoRecursos); 
                if (f && !isNaN(f.getTime())) eventos.push({ tipo: "Recurso", fecha: f, clase: "recurso" }); 
            } 
            if (Array.isArray(causa.diligencias)) causa.diligencias.forEach(d => { 
                const f = toDate(d.fecha); 
                if (f && !isNaN(f.getTime())) eventos.push({ tipo: "Diligencia", fecha: f, detalle: d.detalle||'', clase: "diligencia" }); 
            }); 
            return eventos.sort((a,b)=>b.fecha-a.fecha); 
        }
        function getCachedData(key) { const c = localStorage.getItem(key); if (!c) return null; const d = JSON.parse(c); if (Date.now() - d.timestamp > 24 * 60 * 60 * 1000) return null; return d.items; }
        function setCachedData(key, items) { localStorage.setItem(key, JSON.stringify({ items, timestamp: Date.now() })); }
        
        async function cargarCatalogoOptimizado(coleccion, cacheKey, transform) { 
            const cached = getCachedData(cacheKey); if (cached) return cached; 
            try { 
                const snap = await dbNueva.collection(coleccion).get(); 
                const items = snap.docs.map(transform); 
                setCachedData(cacheKey, items); return items; 
            } catch (e) { return []; } 
        }
        
        async function cargarCatalagosConCache() { 
            const usrs = await cargarCatalogoOptimizado("usuarios", "cache_usuarios", d => d.data().nombreCompleto); 
            usuariosCache = usrs.filter(u=>u).sort((a,b)=>a.localeCompare(b));
            
            // Si no es admin, la lista de usuarios será solo su nombre
            if (!isAdmin && currentDisplayName) {
                // Para el filtro de usuario, solo mostrar su nombre (o deshabilitar)
                poblarFiltro('filtroUsuario', [currentDisplayName], 'Usuario (solo el tuyo)');
                // El select de usuario asignado se llenará más tarde en resetFormCausa
            } else {
                poblarFiltro('filtroUsuario', usuariosCache, 'Usuario (todos)');
            }
            
            const juzs = await cargarCatalogoOptimizado("juzgados", "cache_juzgados", d => ({ tipo: d.data().tipo, nombre: d.data().nombre })); 
            juzgadosPorTipoCache = {}; 
            juzs.forEach(({ tipo, nombre }) => { if (tipo && nombre) { if (!juzgadosPorTipoCache[tipo]) juzgadosPorTipoCache[tipo] = []; juzgadosPorTipoCache[tipo].push(nombre); } }); 
            Object.keys(juzgadosPorTipoCache).forEach(t => juzgadosPorTipoCache[t].sort((a,b)=>a.localeCompare(b))); 
            poblarTiposProceso(); 
            poblarFiltroIntervencion(); 
        }

                filtroUsuario.addEventListener('change', () => { cachedTotalCount = null; actualizarFiltros(); });
                filtroPrioridad.addEventListener('change', () => { cachedTotalCount = null; actualizarFiltros(); });
                filtroIntervencion.addEventListener('change', () => { cachedTotalCount = null; actualizarFiltros(); });
                filtroTipoProceso.addEventListener('change', () => { cachedTotalCount = null; actualizarFiltros(); });
                $("filtroCostas").addEventListener('change', () => { cachedTotalCount = null; actualizarFiltros(); });
                $("filtroPeriodo").addEventListener('change', () => { cachedTotalCount = null; actualizarFiltros(); });

                let expedienteTimer;
                $("numCausa").addEventListener('input', function(){
                    clearTimeout(expedienteTimer);
                    expedienteTimer = setTimeout(() => { validarExistenciaExpediente(); }, 1500);
                });
                
                selTipo.addEventListener('change', function() { poblarJuzgadosPorTipo(this.value); });
                $("recursos").addEventListener('change', function() { $("recursos-opcionales").style.display = this.value ? "block" : "none"; });
                $("habilitarAudienciaGesell").addEventListener('change', function() { $("audienciaGesell").disabled = !this.checked; $("nnyaGesell").disabled = !this.checked; });
                tabButtons.forEach(btn => { btn.addEventListener('click', () => { tabButtons.forEach(b => b.classList.remove('active')); tabContents.forEach(c => c.classList.remove('active')); btn.classList.add('active'); $(btn.getAttribute('data-tab')).classList.add('active'); }); });
                const btnBold = $("btnBold"); const btnColorAzul = $("btnColorAzul"); const btnColorRojo = $("btnColorRojo"); const btnColorVerde = $("btnColorVerde"); const btnColorNormal = $("btnColorNormal");
                if(btnBold) btnBold.onclick = () => { document.execCommand('bold', false, null); btnBold.classList.toggle('active'); };
                if(btnColorAzul) btnColorAzul.onclick = () => document.execCommand('foreColor', false, '#2563EB');
                if(btnColorRojo) btnColorRojo.onclick = () => document.execCommand('foreColor', false, '#EF4444');
                if(btnColorVerde) btnColorVerde.onclick = () => document.execCommand('foreColor', false, '#10B981');
                if(btnColorNormal) btnColorNormal.onclick = () => document.execCommand('foreColor', false, '#0F172A');
                observacionesEditor.addEventListener('input', () => observacionesHidden.value = observacionesEditor.innerHTML);
                $("btnPrintFiltrado").onclick = () => window.print(); 
                $("btnPrintRegistro").onclick = () => window.print();

                // Inicializar el estado del botón Nuevo según la base seleccionada
                if ($("selectorBaseDatos").value === "historica") {
                    $("btnNuevo").style.display = "none";
                }
            });
        });
    </script>
</body>
</html>
