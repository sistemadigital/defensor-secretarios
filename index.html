<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>⚖️ Sistema Digital Defensoria 6</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Fondo IDÉNTICO al original: degradado suave azul muy claro */
        body, html {
            height: 100%;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e6f0fa 100%);
            overflow-x: hidden;
            color: #0a1e2f;
            font-size: 16px;
            line-height: 1.5;
        }

        /* Contenedor que centra perfectamente la imagen sin card extra */
        .centro-pantalla {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* Contenedor dinámico: se ajusta al tamaño de la imagen, sin rellenos */
        .contenedor-dinamico {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: auto;
            transition: all 0.2s ease;
        }

        /* IMAGEN: misma que antes, con animación de anillos sutiles (opcional pero conserva estilo) */
        .img-wrapper {
            position: relative;
            display: inline-block;
            border-radius: 50%;
            cursor: pointer;
            outline: none;
            width: 280px;
            height: auto;
            transition: transform 0.2s;
            animation: float 5s ease-in-out infinite;
        }

        .img-wrapper::before {
            content: '';
            position: absolute;
            top: -12px;
            left: -12px;
            right: -12px;
            bottom: -12px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #00b4d8, #0077b6, #00b4d8);
            opacity: 0.5;
            z-index: -1;
            animation: rotateRing 4s linear infinite;
        }

        .img-wrapper::after {
            content: '';
            position: absolute;
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            border-radius: 50%;
            background: conic-gradient(from 90deg, rgba(0,180,216,0.2), rgba(0,119,182,0.2));
            z-index: -2;
            animation: rotateRingReverse 6s linear infinite;
            filter: blur(8px);
        }

        .img-3d {
            width: 100%;
            max-width: 280px;
            height: auto;
            display: block;
            border-radius: 50%;
            box-shadow: 0 20px 30px -8px rgba(0, 0, 0, 0.15);
            pointer-events: none;
        }

        @keyframes rotateRing {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes rotateRingReverse {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-360deg); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Área de texto y protocolo (inicialmente invisible) */
        .dynamic-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
            margin-top: 1.5rem;
            width: 100%;
        }

        .typewriter-title {
            font-size: clamp(1.6rem, 6vw, 2.4rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            color: #0a2b3e;  /* color sólido, sin animación de gradiente */
            text-align: center;
            line-height: 1.3;
        }

        .protocolo-link {
            text-decoration: none;
            transition: all 0.2s ease;
            border-radius: 60px;
            display: inline-block;
        }

        .protocolo-row {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
            padding: 0.6rem 1.5rem;
            border-radius: 60px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05), 0 0 0 1px rgba(0,180,216,0.2);
            transition: all 0.2s;
        }

        .protocolo-texto {
            font-weight: 700;
            font-size: clamp(0.8rem, 3.5vw, 0.95rem);
            color: #0a2b3e;
            letter-spacing: -0.2px;
        }

        .protocolo-icono {
            height: clamp(28px, 5vw, 36px);
            width: auto;
            flex-shrink: 0;
        }

        .protocolo-link:hover .protocolo-row {
            background: white;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.1), 0 0 0 1px #00b4d8;
            transform: translateY(-2px);
        }

        /* MODALES (igual que original, bien pulidos) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 30, 47, 0.75);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s ease;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-contenido {
            background: #ffffff;
            max-width: 480px;
            width: 90%;
            border-radius: 2rem;
            padding: 2rem 1.8rem;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.2);
            position: relative;
            transform: scale(0.96);
            transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(0, 180, 216, 0.2);
        }

        .modal-overlay.active .modal-contenido {
            transform: scale(1);
        }

        .btn-cerrar-modal {
            position: absolute;
            top: 1.2rem;
            right: 1.4rem;
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: #8ba0b5;
            transition: 0.2s;
            line-height: 1;
        }

        .btn-cerrar-modal:hover {
            color: #0a2b3e;
        }

        .modal-contenido h3 {
            font-weight: 800;
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #0a2b3e, #0077b6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .grupo-input {
            margin-bottom: 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .grupo-input label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #4a627a;
        }

        .grupo-input input {
            padding: 14px 16px;
            border: 1.5px solid #e2edf7;
            border-radius: 20px;
            font-size: 0.95rem;
            font-family: 'Inter', monospace;
            background: white;
            transition: all 0.2s;
            width: 100%;
            color: #0a2b3e;
        }

        .grupo-input input:focus {
            outline: none;
            border-color: #00b4d8;
            box-shadow: 0 0 0 3px rgba(0, 180, 216, 0.2);
        }

        .mostrar-clave {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #2c4c6e;
            margin: -5px 0 12px 0;
            cursor: pointer;
        }

        .btn-modal-primario {
            width: 100%;
            padding: 14px;
            background: #0a2b3e;
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
        }

        .btn-modal-primario:hover {
            background: #005f8c;
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(0, 120, 180, 0.25);
        }

        .enlace-modal {
            text-align: center;
            margin-top: 1.2rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: #4a627a;
        }

        .enlace-modal span {
            color: #0077b6;
            font-weight: 700;
            cursor: pointer;
        }

        .enlace-modal span:hover {
            text-decoration: underline;
        }

        /* Mensaje flotante */
        .auth-message-global {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #0a2b3e;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 2100;
            display: none;
            backdrop-filter: blur(12px);
            background: rgba(10, 43, 62, 0.95);
            box-shadow: 0 6px 18px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 85vw;
        }

        .auth-message-global.error {
            background: #bc4742;
        }

        .auth-message-global.success {
            background: #2a9d8f;
        }

        /* Créditos flotantes (idéntico) */
        #creditos-flotante {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(10, 30, 47, 0.85);
            backdrop-filter: blur(8px);
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            z-index: 1100;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            animation: fadeIn 0.5s ease-out;
            font-weight: 500;
            font-size: 0.75rem;
        }

        .texto-version {
            font-size: 0.6rem;
            opacity: 0.7;
            margin-top: 2px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-out {
            opacity: 0 !important;
            transform: translateY(-20px) !important;
            transition: opacity 0.8s, transform 0.8s;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .img-wrapper {
                width: 220px;
            }
            .img-3d {
                max-width: 220px;
            }
        }
    </style>
</head>
<body>

    <div id="creditos-flotante">
        <span>Diseño y programación: Rómulo Fioravante</span>
        <span class="texto-version">Versión 5.0.2026</span>
    </div>

    <div class="centro-pantalla">
        <div class="contenedor-dinamico" id="contenedorDinamico">
            <!-- Imagen centrada, sin texto debajo -->
            <div class="img-wrapper" id="imagenPrincipal" role="button" tabindex="0" aria-label="Activar sistema">
                <img src="https://github.com/sistema-secretarios/imagenes-sistema/blob/main/pc.png?raw=true" 
                     alt="Sistema Digital" 
                     class="img-3d">
            </div>
            <!-- Aquí se insertarán dinámicamente el texto y protocolo (inicialmente vacío) -->
            <div id="dynamicArea" class="dynamic-area" style="display: none;"></div>
        </div>
    </div>

    <!-- MODALES -->
    <div id="modalLogin" class="modal-overlay">
        <div class="modal-contenido">
            <button class="btn-cerrar-modal" id="cerrarModalLoginBtn">&times;</button>
            <h3>Bienvenido</h3>
            <div>
                <div class="grupo-input">
                    <label>Correo electrónico</label>
                    <input type="email" id="loginEmail" placeholder="usuario@mpmisiones.gob.ar" autocomplete="email">
                </div>
                <div class="grupo-input">
                    <label>Contraseña</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
                </div>
                <label class="mostrar-clave">
                    <input type="checkbox" id="mostrarLoginPass"> Mostrar contraseña
                </label>
                <button class="btn-modal-primario" id="btnLoginAction">Entrar al sistema</button>
                <div class="enlace-modal">
                    ¿No tienes cuenta? <span id="cambiarARegistroDesdeLogin">Regístrate aquí</span>
                </div>
            </div>
        </div>
    </div>

    <div id="modalRegistro" class="modal-overlay">
        <div class="modal-contenido">
            <button class="btn-cerrar-modal" id="cerrarModalRegistroBtn">&times;</button>
            <h3>Registro</h3>
            <div>
                <div class="grupo-input">
                    <label>Nombre completo</label>
                    <input type="text" id="registerName" placeholder="Nombre y apellido" autocomplete="name">
                </div>
                <div class="grupo-input">
                    <label>Correo electrónico</label>
                    <input type="email" id="registerEmail" placeholder="usuario@mpmisiones.gob.ar" autocomplete="email">
                </div>
                <div class="grupo-input">
                    <label>Contraseña</label>
                    <input type="password" id="registerPassword" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
                </div>
                <label class="mostrar-clave">
                    <input type="checkbox" id="mostrarRegPass"> Mostrar contraseña
                </label>
                <button class="btn-modal-primario" id="btnRegisterAction">Registrarse</button>
                <div class="enlace-modal">
                    ¿Ya tienes cuenta? <span id="cambiarALoginDesdeRegistro">Inicia sesión</span>
                </div>
            </div>
        </div>
    </div>

    <div id="globalAuthMessage" class="auth-message-global"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, updateProfile } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBDXZYAxWsvMiMGCrPRp3EBVuU0dzuWF4M",
            authDomain: "sistemadefensoria6.firebaseapp.com",
            projectId: "sistemadefensoria6",
            storageBucket: "sistemadefensoria6.firebasestorage.app",
            messagingSenderId: "1024631392849",
            appId: "1:1024631392849:web:1dc13292e690e2ed100670"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const DEFAULT_DOMAIN = "@mpmisiones.gob.ar";

        // Elementos clave
        const imagenWrapper = document.getElementById('imagenPrincipal');
        const dynamicArea = document.getElementById('dynamicArea');
        const contenedorDinamico = document.getElementById('contenedorDinamico');
        const modalLogin = document.getElementById('modalLogin');
        const modalRegistro = document.getElementById('modalRegistro');

        // Estados
        let currentState = 'idle'; // idle, typing, waitingModal, modalOpen
        let typingInterval = null;
        let modalTimeout = null;

        // Limpiar y resetear a estado original: imagen visible, área dinámica vacía y oculta, modales cerrados
        function resetToInitial() {
            // Detener cualquier proceso en curso
            if (typingInterval) {
                clearInterval(typingInterval);
                typingInterval = null;
            }
            if (modalTimeout) {
                clearTimeout(modalTimeout);
                modalTimeout = null;
            }
            // Asegurar que la imagen esté visible
            if (imagenWrapper) imagenWrapper.style.display = 'block';
            // Limpiar y ocultar el área dinámica
            if (dynamicArea) {
                dynamicArea.innerHTML = '';
                dynamicArea.style.display = 'none';
            }
            // Cerrar modales
            modalLogin.classList.remove('active');
            modalRegistro.classList.remove('active');
            // Resetear estado
            currentState = 'idle';
        }

        // Mostrar el modal de login después de 4 segundos (solo si estamos en waitingModal)
        function scheduleModal() {
            if (modalTimeout) clearTimeout(modalTimeout);
            modalTimeout = setTimeout(() => {
                if (currentState === 'waitingModal') {
                    modalLogin.classList.add('active');
                    currentState = 'modalOpen';
                    document.getElementById('loginEmail').focus();
                }
            }, 4000);
        }

        // Efecto máquina de escribir rápida
        async function typeWriterEffect(element, text, speed = 45) {
            return new Promise((resolve) => {
                let i = 0;
                element.textContent = '';
                typingInterval = setInterval(() => {
                    if (i < text.length) {
                        element.textContent += text.charAt(i);
                        i++;
                    } else {
                        clearInterval(typingInterval);
                        typingInterval = null;
                        resolve();
                    }
                }, speed);
            });
        }

        // Función principal al hacer clic en la imagen (solo en idle)
        async function iniciarSecuencia() {
            if (currentState !== 'idle') return;
            currentState = 'typing';
            
            // 1. Ocultar la imagen
            imagenWrapper.style.display = 'none';
            
            // 2. Mostrar el área dinámica y preparar elementos
            dynamicArea.style.display = 'flex';
            dynamicArea.innerHTML = ''; // Limpiar por si acaso
            
            // Crear elemento para el título
            const titleEl = document.createElement('div');
            titleEl.className = 'typewriter-title';
            dynamicArea.appendChild(titleEl);
            
            // Ejecutar máquina de escribir
            await typeWriterEffect(titleEl, 'Sistema Digital Defensoría 6', 40);
            
            // 3. Una vez escrito, agregar el enlace de Protocolo
            const protocoloLink = document.createElement('a');
            protocoloLink.href = 'https://defensorialocal-seis.github.io/protocolo/';
            protocoloLink.target = '_blank';
            protocoloLink.rel = 'noopener noreferrer';
            protocoloLink.className = 'protocolo-link';
            protocoloLink.innerHTML = `
                <div class="protocolo-row">
                    <span class="protocolo-texto">📋 Protocolo de Actuación Judicial</span>
                    <img src="https://github.com/defensorialocal-seis/protocolo/blob/main/icono1.png?raw=true" 
                         alt="Icono Protocolo" 
                         class="protocolo-icono">
                </div>
            `;
            dynamicArea.appendChild(protocoloLink);
            
            // Cambiar estado para esperar la apertura del modal
            currentState = 'waitingModal';
            scheduleModal();
        }

        // Cerrar modal y resetear completamente (al hacer clic fuera, en X, o escape)
        function handleCloseModalAndReset() {
            if (currentState === 'modalOpen') {
                resetToInitial();
            }
        }

        // Configurar eventos de cierre y cambio entre modales
        function setupModalEvents() {
            const cerrarLogin = document.getElementById('cerrarModalLoginBtn');
            const cerrarRegistro = document.getElementById('cerrarModalRegistroBtn');
            cerrarLogin.addEventListener('click', handleCloseModalAndReset);
            cerrarRegistro.addEventListener('click', handleCloseModalAndReset);
            
            // Clic en overlay
            modalLogin.addEventListener('click', (e) => {
                if (e.target === modalLogin) handleCloseModalAndReset();
            });
            modalRegistro.addEventListener('click', (e) => {
                if (e.target === modalRegistro) handleCloseModalAndReset();
            });
            
            // Tecla ESC
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && currentState === 'modalOpen') {
                    handleCloseModalAndReset();
                }
            });
            
            // Cambio entre login y registro (sin resetear el estado general)
            const switchToReg = document.getElementById('cambiarARegistroDesdeLogin');
            const switchToLogin = document.getElementById('cambiarALoginDesdeRegistro');
            switchToReg.addEventListener('click', () => {
                if (currentState === 'modalOpen') {
                    modalLogin.classList.remove('active');
                    modalRegistro.classList.add('active');
                    document.getElementById('registerName').focus();
                }
            });
            switchToLogin.addEventListener('click', () => {
                if (currentState === 'modalOpen') {
                    modalRegistro.classList.remove('active');
                    modalLogin.classList.add('active');
                    document.getElementById('loginEmail').focus();
                }
            });
        }

        // Funciones de autenticación
        function formatEmail(input) {
            let email = input.trim();
            if (email && !email.includes('@')) email += DEFAULT_DOMAIN;
            return email;
        }

        function showMessage(msg, type) {
            const div = document.getElementById('globalAuthMessage');
            div.textContent = msg;
            div.className = 'auth-message-global';
            if (type === 'error') div.classList.add('error');
            else if (type === 'success') div.classList.add('success');
            div.style.display = 'block';
            setTimeout(() => {
                div.style.display = 'none';
                div.classList.remove('error', 'success');
            }, 4000);
        }

        window.loginUser = async function() {
            const rawEmail = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const email = formatEmail(rawEmail);
            if (!email || !password) {
                showMessage('Completa todos los campos', 'error');
                return;
            }
            try {
                await signInWithEmailAndPassword(auth, email, password);
                showMessage('Acceso concedido. Iniciando sistema...', 'success');
                setTimeout(() => window.location.href = 'app.html', 2000);
            } catch (error) {
                showMessage('Credenciales inválidas', 'error');
            }
        };

        window.registerUser = async function() {
            const name = document.getElementById('registerName').value.trim();
            const rawEmail = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const email = formatEmail(rawEmail);
            if (!name || !email || !password) {
                showMessage('Completa todos los campos', 'error');
                return;
            }
            if (password.length < 6) {
                showMessage('La contraseña debe tener al menos 6 caracteres', 'error');
                return;
            }
            try {
                const cred = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(cred.user, { displayName: name });
                showMessage('Cuenta creada con éxito', 'success');
                setTimeout(() => window.location.href = 'app.html', 2000);
            } catch (error) {
                if (error.code === 'auth/email-already-in-use') {
                    showMessage('El correo ya está registrado', 'error');
                } else {
                    showMessage('Error al crear la cuenta', 'error');
                }
            }
        };

        // Asignar eventos a botones de los modales
        document.getElementById('btnLoginAction').addEventListener('click', () => loginUser());
        document.getElementById('btnRegisterAction').addEventListener('click', () => registerUser());
        
        // Mostrar/ocultar contraseña
        const mostrarLogin = document.getElementById('mostrarLoginPass');
        const loginPass = document.getElementById('loginPassword');
        mostrarLogin.addEventListener('change', () => {
            loginPass.type = mostrarLogin.checked ? 'text' : 'password';
        });
        const mostrarReg = document.getElementById('mostrarRegPass');
        const regPass = document.getElementById('registerPassword');
        mostrarReg.addEventListener('change', () => {
            regPass.type = mostrarReg.checked ? 'text' : 'password';
        });
        
        // Enter en inputs
        const loginEmail = document.getElementById('loginEmail');
        const loginPassInput = document.getElementById('loginPassword');
        const handleLoginEnter = (e) => { if (e.key === 'Enter') loginUser(); };
        loginEmail.addEventListener('keypress', handleLoginEnter);
        loginPassInput.addEventListener('keypress', handleLoginEnter);
        
        const regName = document.getElementById('registerName');
        const regEmail = document.getElementById('registerEmail');
        const regPassword = document.getElementById('registerPassword');
        const handleRegEnter = (e) => { if (e.key === 'Enter') registerUser(); };
        regName.addEventListener('keypress', handleRegEnter);
        regEmail.addEventListener('keypress', handleRegEnter);
        regPassword.addEventListener('keypress', handleRegEnter);
        
        // Evento clic en la imagen
        imagenWrapper.addEventListener('click', (e) => {
            e.stopPropagation();
            iniciarSecuencia();
        });
        imagenWrapper.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                iniciarSecuencia();
            }
        });
        
        // Redirección si ya está autenticado
        onAuthStateChanged(auth, (user) => {
            if (user && (window.location.pathname.includes('index.html') || window.location.pathname === '/' || window.location.pathname === '')) {
                window.location.href = 'app.html';
            }
        });
        
        // Créditos flotantes: desaparecen a los 5 segundos
        setTimeout(() => {
            const cred = document.getElementById('creditos-flotante');
            if (cred) {
                cred.classList.add('fade-out');
                setTimeout(() => cred.remove(), 1000);
            }
        }, 5000);
        
        // Inicializar todo en estado idle
        resetToInitial();
        setupModalEvents();
    </script>
</body>
</html>
