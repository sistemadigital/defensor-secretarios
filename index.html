<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>⚖️ Sistema Digital Defensoría 6</title>

    <!-- Precarga de la imagen principal para que aparezca rápidamente -->
    <link rel="preload" as="image" href="https://github.com/sistema-secretarios/imagenes-sistema/blob/main/pc.png?raw=true" fetchpriority="high" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet" />

    <style>
        /* ── RESET ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ── BARRAS GLASS (SUPERIOR E INFERIOR) ── */
        .cinta-glass {
            position: fixed;
            left: 0;
            width: 100%;
            height: 10px;
            z-index: 9999;
            background: linear-gradient(to right, #004e92, #00b4d8, #0077b6);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            box-shadow: 0 0 18px rgba(0, 100, 200, 0.25);
            border-bottom: 1px solid rgba(0, 180, 216, 0.3);
            pointer-events: none;
        }

        .cinta-top {
            top: 0;
            border-bottom: 2px solid rgba(0, 200, 255, 0.3);
        }

        .cinta-bottom {
            bottom: 0;
            border-bottom: none;
            border-top: 2px solid rgba(0, 200, 255, 0.3);
            background: linear-gradient(to left, #004e92, #00b4d8, #0077b6);
        }

        /* ── FONDO Y ESTRUCTURA ── */
        body,
        html {
            height: 100%;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #ffffff;
            position: relative;
            overflow-x: hidden;
            color: #0a1e2f;
            font-size: 16px;
            line-height: 1.5;
            padding-top: 10px;
            padding-bottom: 120px;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image:
                radial-gradient(circle at 15% 30%, rgba(0, 180, 216, 0.02) 1px, transparent 1px),
                radial-gradient(circle at 70% 85%, rgba(0, 119, 182, 0.02) 1px, transparent 1px);
            background-size: 40px 40px, 60px 60px;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image:
                repeating-linear-gradient(0deg, rgba(0, 119, 182, 0.04) 0px, rgba(0, 119, 182, 0.04) 1px, transparent 1px, transparent 32px),
                repeating-linear-gradient(90deg, rgba(0, 119, 182, 0.04) 0px, rgba(0, 119, 182, 0.04) 1px, transparent 1px, transparent 32px);
        }

        .bg-silk {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(ellipse at 50% 40%, rgba(255, 255, 255, 1) 0%, rgba(250, 252, 255, 0.96) 100%);
        }

        /* ── TEXTO INSTITUCIONAL FIJO (más grande) ── */
        .header-institucional {
            position: fixed;
            top: 10px;
            left: 0;
            width: 100%;
            z-index: 100;
            text-align: center;
            padding: 8px 1rem 6px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-bottom: 1px solid rgba(0, 180, 216, 0.15);
            pointer-events: none;
        }

        .header-institucional * {
            pointer-events: none;
        }

        .titulo-institucional {
            font-size: clamp(1.4rem, 3.6vw, 2.4rem);
            font-weight: 900;
            letter-spacing: -0.01em;
            background: linear-gradient(135deg, #003d66, #0077b6, #00b4d8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1.2;
        }

        .subtitulo-institucional {
            font-size: clamp(0.9rem, 2.2vw, 1.4rem);
            font-weight: 700;
            color: #005f8c;
            letter-spacing: 0.2px;
            opacity: 0.9;
            line-height: 1.3;
        }

        /* ── CENTRO DE PANTALLA: SOLO LA IMAGEN (SIEMPRE CENTRADA) ── */
        .centro-pantalla {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 1rem;
            pointer-events: none;
        }

        .contenedor-dinamico {
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            width: 100%;
            height: 100%;
        }

        /* ── IMAGEN CON BORDE GLASS (REDUCIDA) ── */
        .img-wrapper {
            position: relative;
            display: inline-block;
            border-radius: 50%;
            cursor: pointer;
            outline: none;
            width: 340px;
            height: auto;
            pointer-events: auto;
            transition: transform 0.2s ease, filter 0.2s ease;
            will-change: transform;
            border-radius: 50%;
            overflow: visible;
        }

        .img-wrapper::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            background: conic-gradient(from 0deg,
                    rgba(0, 180, 216, 0.9),
                    rgba(0, 230, 255, 0.6),
                    rgba(255, 255, 255, 0.9),
                    rgba(0, 200, 255, 0.7),
                    rgba(0, 180, 216, 0.9));
            animation: rotateBorder 6s linear infinite, pulseGlow 3s ease-in-out infinite alternate;
            z-index: -1;
            filter: blur(2px);
            box-shadow: 0 0 30px rgba(0, 180, 216, 0.4);
        }

        @keyframes rotateBorder {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes pulseGlow {
            0% {
                opacity: 0.7;
                filter: blur(2px) brightness(1);
            }
            100% {
                opacity: 1;
                filter: blur(4px) brightness(1.3);
            }
        }

        .img-wrapper::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.35) 0%, transparent 60%),
                        radial-gradient(circle at 70% 70%, rgba(0, 200, 255, 0.15) 0%, transparent 50%);
            background-blend-mode: overlay;
            pointer-events: none;
            border-radius: 50%;
            animation: glassShine 6s ease-in-out infinite alternate;
            z-index: 2;
        }

        @keyframes glassShine {
            0% {
                transform: rotate(0deg) scale(1);
                opacity: 0.6;
            }
            50% {
                opacity: 1;
                transform: rotate(180deg) scale(1.1);
            }
            100% {
                transform: rotate(360deg) scale(1);
                opacity: 0.6;
            }
        }

        .img-wrapper:hover::after {
            animation-duration: 2.5s;
        }

        .img-3d {
            width: 100%;
            max-width: 340px;
            height: auto;
            display: block;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(0, 180, 216, 0.2), 0 4px 20px rgba(0, 0, 0, 0.06);
            transition: all 0.2s ease;
            pointer-events: none;
            background: #ffffff;
            position: relative;
            z-index: 1;
            border: 4px solid transparent;
            fetchpriority: high;
        }

        /* ── FOOTER FIJO (TÍTULO SISTEMA DIGITAL MÁS PEQUEÑO) ── */
        .footer-info {
            position: fixed;
            bottom: 18px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 100;
            padding: 0 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            pointer-events: none;
        }

        .footer-info * {
            pointer-events: auto;
        }

        .footer-titulo {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 900;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #003d66, #00b4d8, #0077b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 30px rgba(0, 180, 216, 0.3);
            line-height: 1.1;
        }

        .protocolo-footer-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: clamp(1rem, 2.4vw, 1.3rem);
            font-weight: 700;
            color: #0a2b3e;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            padding: 10px 28px 10px 20px;
            border-radius: 60px;
            border: 1.5px solid rgba(0, 180, 216, 0.3);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
            transition: all 0.25s ease;
            letter-spacing: -0.2px;
            margin-top: 2px;
        }

        .protocolo-footer-link:hover {
            background: #ffffff;
            box-shadow: 0 8px 24px rgba(0, 180, 216, 0.2);
            transform: translateY(-2px);
            border-color: #00b4d8;
        }

        /* ── CRÉDITOS: ESQUINA SUPERIOR DERECHA ── */
        #creditos-flotante {
            position: fixed;
            top: 14px;
            right: 16px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            color: #0077b6;
            padding: 6px 16px;
            border-radius: 40px;
            z-index: 1100;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            animation: fadeIn 0.5s ease-out;
            font-weight: 600;
            font-size: 0.7rem;
            border: 1px solid rgba(0, 119, 182, 0.2);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            line-height: 1.3;
        }

        .texto-version {
            font-size: 0.55rem;
            opacity: 0.7;
            margin-top: 1px;
            color: #005f8c;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-out {
            opacity: 0 !important;
            transform: translateY(-20px) !important;
            transition: opacity 0.8s, transform 0.8s;
        }

        /* ── MODALES ── */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 30, 47, 0.75);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s ease;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-contenido {
            background: #ffffff;
            max-width: 480px;
            width: 90%;
            border-radius: 2rem;
            padding: 2rem 1.8rem;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.2);
            position: relative;
            transform: scale(0.96);
            transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(0, 180, 216, 0.2);
            text-align: center;
        }

        .modal-overlay.active .modal-contenido {
            transform: scale(1);
        }

        .btn-cerrar-modal {
            position: absolute;
            top: 1.2rem;
            right: 1.4rem;
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: #8ba0b5;
            transition: 0.2s;
            line-height: 1;
        }

        .btn-cerrar-modal:hover {
            color: #0a2b3e;
        }

        .modal-contenido h3 {
            font-weight: 800;
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #0a2b3e, #0077b6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .grupo-input {
            margin-bottom: 1.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            width: 100%;
        }

        .grupo-input label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #4a627a;
        }

        .grupo-input input {
            padding: 14px 16px;
            border: 1.5px solid #e2edf7;
            border-radius: 20px;
            font-size: 0.95rem;
            font-family: 'Inter', monospace;
            background: white;
            transition: all 0.2s;
            width: 100%;
            max-width: 320px;
            color: #0a2b3e;
            text-align: center;
        }

        .grupo-input input:focus {
            outline: none;
            border-color: #00b4d8;
            box-shadow: 0 0 0 3px rgba(0, 180, 216, 0.2);
        }

        .mostrar-clave {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #2c4c6e;
            margin: -5px 0 12px 0;
            cursor: pointer;
        }

        .btn-modal-primario {
            width: 100%;
            max-width: 320px;
            padding: 14px;
            background: #0a2b3e;
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
        }

        .btn-modal-primario:hover {
            background: #005f8c;
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(0, 120, 180, 0.25);
        }

        .enlace-modal {
            text-align: center;
            margin-top: 1.2rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: #4a627a;
        }

        .enlace-modal span {
            color: #0077b6;
            font-weight: 700;
            cursor: pointer;
        }

        .enlace-modal span:hover {
            text-decoration: underline;
        }

        .auth-message-global {
            position: fixed;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%);
            background: #0a2b3e;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 2100;
            display: none;
            backdrop-filter: blur(12px);
            background: rgba(10, 43, 62, 0.95);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
            text-align: center;
            max-width: 85vw;
        }

        .auth-message-global.error {
            background: #bc4742;
        }

        .auth-message-global.success {
            background: #2a9d8f;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 640px) {
            .img-wrapper {
                width: 260px;
            }
            .img-3d {
                max-width: 260px;
            }
            .cinta-glass {
                height: 8px;
            }
            body {
                padding-top: 8px;
                padding-bottom: 130px;
            }
            .header-institucional {
                top: 8px;
                padding: 6px 0.8rem 4px;
            }
            .titulo-institucional {
                font-size: clamp(1.2rem, 3.5vw, 1.8rem);
            }
            .subtitulo-institucional {
                font-size: clamp(0.8rem, 2.5vw, 1.1rem);
            }
            .footer-titulo {
                font-size: clamp(2.2rem, 8vw, 3.8rem);
            }
            .protocolo-footer-link {
                font-size: clamp(0.95rem, 2.8vw, 1.1rem);
                padding: 8px 20px 8px 16px;
                gap: 8px;
                border-width: 1.5px;
            }
            #creditos-flotante {
                top: 12px;
                right: 12px;
                font-size: 0.65rem;
                padding: 4px 12px;
            }
        }

        @media (max-width: 480px) {
            .img-wrapper {
                width: 200px;
            }
            .img-3d {
                max-width: 200px;
            }
            body {
                padding-bottom: 140px;
            }
            .header-institucional {
                top: 8px;
                padding: 4px 0.5rem 2px;
            }
            .titulo-institucional {
                font-size: 1.1rem;
            }
            .subtitulo-institucional {
                font-size: 0.7rem;
            }
            .footer-titulo {
                font-size: 2rem;
            }
            .protocolo-footer-link {
                font-size: 0.85rem;
                padding: 6px 14px;
                gap: 6px;
            }
            #creditos-flotante {
                top: 10px;
                right: 10px;
                font-size: 0.6rem;
                padding: 4px 10px;
            }
        }
    </style>
</head>
<body>

    <!-- BARRAS GLASS -->
    <div class="cinta-glass cinta-top" aria-hidden="true"></div>
    <div class="cinta-glass cinta-bottom" aria-hidden="true"></div>

    <div class="bg-silk"></div>

    <!-- TEXTO INSTITUCIONAL FIJO -->
    <div class="header-institucional">
        <div class="titulo-institucional">Defensoria Civil y Comercial 6</div>
        <div class="subtitulo-institucional">Ministerio Público de Misiones</div>
    </div>

    <!-- CRÉDITOS: ESQUINA SUPERIOR DERECHA -->
    <div id="creditos-flotante">
        <span>Diseño y programación: Rómulo Fioravante</span>
        <span class="texto-version">Versión 5.0.2026</span>
    </div>

    <!-- CONTENIDO PRINCIPAL: SOLO LA IMAGEN CENTRADA -->
    <div class="centro-pantalla">
        <div class="contenedor-dinamico" id="contenedorDinamico">
            <div class="img-wrapper" id="imagenPrincipal" role="button" tabindex="0" aria-label="Activar sistema">
                <img src="https://github.com/sistema-secretarios/imagenes-sistema/blob/main/pc.png?raw=true"
                     alt="Sistema Digital"
                     class="img-3d"
                     loading="eager"
                     fetchpriority="high" />
            </div>
        </div>
    </div>

    <!-- FOOTER FIJO (TÍTULO SISTEMA DIGITAL + BOTÓN) -->
    <div class="footer-info">
        <span class="footer-titulo">Sistema Digital</span>
        <a href="https://defensorialocal-seis.github.io/protocolo/"
           target="_blank"
           rel="noopener noreferrer"
           class="protocolo-footer-link">
            📋 Protocolo de actuación judicial
        </a>
    </div>

    <!-- MODALES -->
    <div id="modalLogin" class="modal-overlay">
        <div class="modal-contenido">
            <button class="btn-cerrar-modal" id="cerrarModalLoginBtn">&times;</button>
            <h3>Bienvenido</h3>
            <div>
                <div class="grupo-input">
                    <label>Correo electrónico</label>
                    <input type="email" id="loginEmail" placeholder="usuario@mpmisiones.gob.ar" autocomplete="email" />
                </div>
                <div class="grupo-input">
                    <label>Contraseña</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" />
                </div>
                <label class="mostrar-clave">
                    <input type="checkbox" id="mostrarLoginPass" /> Mostrar contraseña
                </label>
                <button class="btn-modal-primario" id="btnLoginAction">Entrar al sistema</button>
                <div class="enlace-modal">
                    ¿No tienes cuenta? <span id="cambiarARegistroDesdeLogin">Regístrate aquí</span>
                </div>
            </div>
        </div>
    </div>

    <div id="modalRegistro" class="modal-overlay">
        <div class="modal-contenido">
            <button class="btn-cerrar-modal" id="cerrarModalRegistroBtn">&times;</button>
            <h3>Registro</h3>
            <div>
                <div class="grupo-input">
                    <label>Nombre completo</label>
                    <input type="text" id="registerName" placeholder="Nombre y apellido" autocomplete="name" />
                </div>
                <div class="grupo-input">
                    <label>Correo electrónico</label>
                    <input type="email" id="registerEmail" placeholder="usuario@mpmisiones.gob.ar" autocomplete="email" />
                </div>
                <div class="grupo-input">
                    <label>Contraseña</label>
                    <input type="password" id="registerPassword" placeholder="Mínimo 6 caracteres" autocomplete="new-password" />
                </div>
                <label class="mostrar-clave">
                    <input type="checkbox" id="mostrarRegPass" /> Mostrar contraseña
                </label>
                <button class="btn-modal-primario" id="btnRegisterAction">Registrarse</button>
                <div class="enlace-modal">
                    ¿Ya tienes cuenta? <span id="cambiarALoginDesdeRegistro">Inicia sesión</span>
                </div>
            </div>
        </div>
    </div>

    <div id="globalAuthMessage" class="auth-message-global"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, updateProfile } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBDXZYAxWsvMiMGCrPRp3EBVuU0dzuWF4M",
            authDomain: "sistemadefensoria6.firebaseapp.com",
            projectId: "sistemadefensoria6",
            storageBucket: "sistemadefensoria6.firebasestorage.app",
            messagingSenderId: "1024631392849",
            appId: "1:1024631392849:web:1dc13292e690e2ed100670"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const DEFAULT_DOMAIN = "@mpmisiones.gob.ar";

        const imagenWrapper = document.getElementById('imagenPrincipal');
        const modalLogin = document.getElementById('modalLogin');
        const modalRegistro = document.getElementById('modalRegistro');

        let currentState = 'idle';

        function resetToInitial() {
            if (imagenWrapper) imagenWrapper.style.display = 'block';
            modalLogin.classList.remove('active');
            modalRegistro.classList.remove('active');
            currentState = 'idle';
        }

        function abrirLogin() {
            if (currentState === 'idle') {
                imagenWrapper.style.display = 'none';
                modalLogin.classList.add('active');
                currentState = 'modalOpen';
                document.getElementById('loginEmail').focus();
            }
        }

        function handleCloseModalAndReset() {
            if (currentState === 'modalOpen') {
                resetToInitial();
            }
        }

        function setupModalEvents() {
            const cerrarLogin = document.getElementById('cerrarModalLoginBtn');
            const cerrarRegistro = document.getElementById('cerrarModalRegistroBtn');
            cerrarLogin.addEventListener('click', handleCloseModalAndReset);
            cerrarRegistro.addEventListener('click', handleCloseModalAndReset);

            modalLogin.addEventListener('click', (e) => {
                if (e.target === modalLogin) handleCloseModalAndReset();
            });
            modalRegistro.addEventListener('click', (e) => {
                if (e.target === modalRegistro) handleCloseModalAndReset();
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && currentState === 'modalOpen') {
                    handleCloseModalAndReset();
                }
            });

            const switchToReg = document.getElementById('cambiarARegistroDesdeLogin');
            const switchToLogin = document.getElementById('cambiarALoginDesdeRegistro');
            switchToReg.addEventListener('click', () => {
                if (currentState === 'modalOpen') {
                    modalLogin.classList.remove('active');
                    modalRegistro.classList.add('active');
                    document.getElementById('registerName').focus();
                }
            });
            switchToLogin.addEventListener('click', () => {
                if (currentState === 'modalOpen') {
                    modalRegistro.classList.remove('active');
                    modalLogin.classList.add('active');
                    document.getElementById('loginEmail').focus();
                }
            });
        }

        function formatEmail(input) {
            let email = input.trim();
            if (email && !email.includes('@')) email += DEFAULT_DOMAIN;
            return email;
        }

        function showMessage(msg, type) {
            const div = document.getElementById('globalAuthMessage');
            div.textContent = msg;
            div.className = 'auth-message-global';
            if (type === 'error') div.classList.add('error');
            else if (type === 'success') div.classList.add('success');
            div.style.display = 'block';
            setTimeout(() => {
                div.style.display = 'none';
                div.classList.remove('error', 'success');
            }, 4000);
        }

        window.loginUser = async function() {
            const rawEmail = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const email = formatEmail(rawEmail);
            if (!email || !password) {
                showMessage('Completa todos los campos', 'error');
                return;
            }
            try {
                await signInWithEmailAndPassword(auth, email, password);
                showMessage('Acceso concedido. Iniciando sistema...', 'success');
                setTimeout(() => window.location.href = 'app.html', 2000);
            } catch (error) {
                showMessage('Credenciales inválidas', 'error');
            }
        };

        window.registerUser = async function() {
            const name = document.getElementById('registerName').value.trim();
            const rawEmail = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const email = formatEmail(rawEmail);
            if (!name || !email || !password) {
                showMessage('Completa todos los campos', 'error');
                return;
            }
            if (password.length < 6) {
                showMessage('La contraseña debe tener al menos 6 caracteres', 'error');
                return;
            }
            try {
                const cred = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(cred.user, { displayName: name });
                showMessage('Cuenta creada con éxito', 'success');
                setTimeout(() => window.location.href = 'app.html', 2000);
            } catch (error) {
                if (error.code === 'auth/email-already-in-use') {
                    showMessage('El correo ya está registrado', 'error');
                } else {
                    showMessage('Error al crear la cuenta', 'error');
                }
            }
        };

        document.getElementById('btnLoginAction').addEventListener('click', () => loginUser());
        document.getElementById('btnRegisterAction').addEventListener('click', () => registerUser());

        const mostrarLogin = document.getElementById('mostrarLoginPass');
        const loginPass = document.getElementById('loginPassword');
        mostrarLogin.addEventListener('change', () => {
            loginPass.type = mostrarLogin.checked ? 'text' : 'password';
        });
        const mostrarReg = document.getElementById('mostrarRegPass');
        const regPass = document.getElementById('registerPassword');
        mostrarReg.addEventListener('change', () => {
            regPass.type = mostrarReg.checked ? 'text' : 'password';
        });

        const loginEmail = document.getElementById('loginEmail');
        const loginPassInput = document.getElementById('loginPassword');
        const handleLoginEnter = (e) => { if (e.key === 'Enter') loginUser(); };
        loginEmail.addEventListener('keypress', handleLoginEnter);
        loginPassInput.addEventListener('keypress', handleLoginEnter);

        const regName = document.getElementById('registerName');
        const regEmail = document.getElementById('registerEmail');
        const regPassword = document.getElementById('registerPassword');
        const handleRegEnter = (e) => { if (e.key === 'Enter') registerUser(); };
        regName.addEventListener('keypress', handleRegEnter);
        regEmail.addEventListener('keypress', handleRegEnter);
        regPassword.addEventListener('keypress', handleRegEnter);

        imagenWrapper.addEventListener('click', (e) => {
            e.stopPropagation();
            abrirLogin();
        });
        imagenWrapper.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                abrirLogin();
            }
        });

        onAuthStateChanged(auth, (user) => {
            if (user && (window.location.pathname.includes('index.html') || window.location.pathname === '/' || window.location.pathname === '')) {
                window.location.href = 'app.html';
            }
        });

        setTimeout(() => {
            const cred = document.getElementById('creditos-flotante');
            if (cred) {
                cred.classList.add('fade-out');
                setTimeout(() => cred.remove(), 1000);
            }
        }, 5000);

        resetToInitial();
        setupModalEvents();
    </script>
</body>
</html>
