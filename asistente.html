<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asistente IA Judicial</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #header { background: #007bff; color: white; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 12px; border-radius: 15px; line-height: 1.4; }
        .user { align-self: flex-end; background: #007bff; color: white; }
        .ai { align-self: flex-start; background: white; border: 1px solid #ddd; }
        #input-area { background: white; padding: 20px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; }
    </style>
</head>
<body>

<div id="header">
    <i class="fas fa-robot"></i> <strong>Consultor de Expedientes IA</strong>
    <button onclick="configKey()" style="float: right; background: none;"><i class="fas fa-cog"></i></button>
</div>

<div id="chat-container" id="chatHistory">
    <div class="msg ai">Bienvenido. ¿Sobre qué expediente o audiencia deseas consultar hoy?</div>
</div>

<div id="input-area">
    <input type="text" id="userInput" placeholder="Escribe tu consulta aquí...">
    <button onclick="enviarMensaje()"><i class="fas fa-paper-plane"></i></button>
</div>

<script>
    // 1. TU CONFIGURACIÓN DE FIREBASE (Copia la de tabla.html)
    const firebaseConfig = {
        apiKey: "AIzaSyBt6X0u0BpiNPcV2SNPrN-spCmjl2AhZaA",
            authDomain: "causas-defensoria.firebaseapp.com",
            projectId: "causas-defensoria",
            storageBucket: "causas-defensoria.appspot.com",
            messagingSenderId: "186064671470",
            appId: "1:186064671470:web:b58bae5eadbe6e469f19ff"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 2. LÓGICA DE SEGURIDAD (API KEY GEMINI)
    function configKey() {
        const key = prompt("Pega tu Gemini API Key:", localStorage.getItem('GEMINI_KEY') || "");
        if (key) localStorage.setItem('GEMINI_KEY', key);
    }

    async function enviarMensaje() {
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat-container');
        const promptTexto = input.value.trim();
        if (!promptTexto) return;

        // Mostrar mensaje usuario
        chat.innerHTML += `<div class="msg user">${promptTexto}</div>`;
        input.value = "";

        // Obtener datos frescos de Firebase
        const snapshot = await db.collection("causas").get();
        const expedientes = snapshot.docs.map(doc => doc.data());

        // Consultar a Gemini
        const respuesta = await consultarGemini(promptTexto, expedientes);
        chat.innerHTML += `<div class="msg ai">${respuesta}</div>`;
        chat.scrollTop = chat.scrollHeight;
    }

    async function consultarGemini(pregunta, datos) {
        const key = localStorage.getItem('GEMINI_KEY');
        if (!key) return "Configura la API Key primero.";

        const contexto = JSON.stringify(datos.map(d => ({ causa: d.numCausa, caratula: d.caratula, prox_audiencia: d.audienciaGesell })));

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: "POST",
                body: JSON.stringify({ contents: [{ parts: [{ text: `Datos: ${contexto}. Pregunta: ${pregunta}` }] }] })
            });
            const json = await res.json();
            return json.candidates[0].content.parts[0].text;
        } catch (e) { return "Error de conexión."; }
    }
</script>
</body>
</html>
