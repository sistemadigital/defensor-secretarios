<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#f8fafc">
  <title>Protocolo Actuacion Defensoria</title>

  <!-- Tipografía institucional moderna -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-app: #f1f5f9;
      --bg-panel: rgba(255, 255, 255, 0.82);
      --border: rgba(30, 41, 59, 0.12);
      --text-main: #0f172a;
      --text-sec: #475569;
      --accent: #1e3a5f;
      --accent-light: #e2e8f0;
      --danger: #dc2626;
      --danger-bg: #fef2f2;
      --danger-border: #fca5a5;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      --radius: 14px;
      --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --filter-height: 64px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-app);
      color: var(--text-main);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===== PANEL SUPERIOR FIJO ===== */
    .top-bar {
      height: 60px;
      background: var(--bg-panel);
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(16px, 3vw, 24px);
      position: relative;
      z-index: 50;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      flex-shrink: 0;
    }

    .header-left { display: flex; align-items: center; gap: 12px; position: relative; }
    .header-title {
      font-size: clamp(0.95rem, 2.5vw, 1.05rem);
      font-weight: 600;
      color: var(--text-main);
      letter-spacing: -0.01em;
    }

    .menu-btn {
      padding: 6px 12px;
      background: transparent; border: 1px solid var(--border);
      border-radius: 8px; cursor: pointer;
      font-size: 0.9rem; font-weight: 500;
      color: var(--accent); transition: var(--transition);
      font-family: inherit;
    }
    .menu-btn:hover { background: var(--accent-light); }

    .menu-dropdown {
      position: absolute;
      top: 100%; left: 0; margin-top: 8px;
      width: min(90vw, 300px);
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 8px;
      display: flex; flex-direction: column; gap: 2px;
      opacity: 0; visibility: hidden; transform: translateY(-8px);
      transition: var(--transition);
      z-index: 60;
    }
    .menu-dropdown.open { opacity: 1; visibility: visible; transform: translateY(0); }

    .menu-item {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-main);
      cursor: pointer;
      transition: var(--transition);
      border: none; background: transparent; width: 100%; text-align: left;
      font-family: inherit;
    }
    .menu-item:hover { background: var(--accent-light); color: var(--accent); }

    .logout-btn {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--danger);
      color: var(--danger);
      border-radius: 8px;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
    }
    .logout-btn:hover { background: var(--danger); color: #fff; }

    /* ===== CONTENIDO PRINCIPAL - OCUPA TODO EL ESPACIO ===== */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
      padding: clamp(16px, 3vw, 24px);
      padding-bottom: calc(80px + var(--filter-height, 64px)); /* espacio extra para el filtro fijo */
      scroll-behavior: smooth;
    }

    /* Ajuste responsive para que el filtro no tape contenido */
    @media (max-width: 768px) {
      .main-content {
        padding-bottom: calc(70px + var(--filter-height, 64px));
      }
    }

    .welcome-banner {
      background: linear-gradient(135deg, var(--accent), #334155);
      color: #fff;
      border-radius: var(--radius);
      padding: clamp(18px, 3vw, 24px);
      margin-bottom: 20px;
      text-align: center;
      box-shadow: 0 4px 12px rgba(30, 58, 95, 0.15);
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .welcome-banner.hide-banner {
      display: none;
    }
    .welcome-banner h2 { 
      font-size: clamp(1.1rem, 2.8vw, 1.45rem); 
      font-weight: 600; 
      line-height: 1.3;
      max-width: 800px;
      margin: 0 auto;
    }

    /* Contenedor dinámico flexible */
    #dynamicContainer {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    /* Grid de tarjetas */
    .content-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      grid-auto-rows: 1fr;
      gap: 20px;
      width: 100%;
      flex: 1;
    }

    .content-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: clamp(20px, 4vw, 32px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
      border-left: 5px solid transparent;
      min-height: clamp(130px, 18vh, 180px);
      height: 100%;
    }
    .content-card.hidden { display: none; }
    .content-card:hover {
      border-left-color: var(--accent);
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.06);
      background: #fafbfc;
      transform: translateY(-2px);
    }
    
    .content-card h3 {
      font-size: clamp(1.15rem, 2.8vw, 1.5rem);
      font-weight: 600;
      color: var(--text-main);
      text-align: center;
      line-height: 1.25;
      letter-spacing: -0.01em;
    }
    .content-card:hover h3 { color: var(--accent); }

    /* ===== PANEL DE CONTENIDO A PANTALLA COMPLETA (CON FILTRO VISIBLE) ===== */
    .iframe-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      min-height: 0;
      width: 100%;
      animation: fadeIn 0.2s ease;
      margin-bottom: 0;
    }

    .iframe-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: #fefefe;
      gap: 12px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .iframe-header h3 {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--accent);
      word-break: break-word;
    }
    .back-btn {
      background: var(--accent-light);
      border: none;
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      color: var(--accent);
      transition: var(--transition);
    }
    .back-btn:hover {
      background: var(--accent);
      color: white;
    }

    .iframe-container {
      flex: 1;
      position: relative;
      background: #f8fafc;
      min-height: 0;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Mensaje de contenido en preparación */
    .preparation-message {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: #fefefe;
    }
    .preparation-message-content {
      color: var(--text-sec);
      max-width: 360px;
      margin: 0 auto;
    }
    .preparation-message svg {
      margin: 0 auto 1rem;
      opacity: 0.6;
    }
    .preparation-message h3 {
      color: var(--accent);
      margin-bottom: 0.5rem;
      font-size: 1.25rem;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== FILTRO INFERIOR SIEMPRE VISIBLE ===== */
    .chat-filter {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: min(92%, 640px);
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      z-index: 100;
      transition: opacity 0.2s, visibility 0.2s, transform 0.2s;
    }
    /* El filtro siempre visible, sin clase para ocultarlo */
    .chat-filter input {
      flex: 1; border: none; outline: none;
      font-size: 0.95rem; padding: 10px 8px;
      background: transparent; font-family: inherit;
      color: var(--text-main);
    }
    .chat-filter input::placeholder { color: var(--text-sec); opacity: 0.7; }
    .chat-filter button {
      padding: 10px 16px;
      border-radius: 14px; border: none;
      background: var(--accent); color: #fff;
      cursor: pointer; font-size: 0.9rem; font-weight: 500;
      font-family: inherit;
      transition: var(--transition);
    }
    .chat-filter button:hover { background: #16304d; }

    /* ===== MODAL ALERTA ===== */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(15, 23, 42, 0.45);
      backdrop-filter: blur(4px);
      display: grid; place-items: center;
      opacity: 0; visibility: hidden; transition: var(--transition);
      z-index: 200;
    }
    .modal-overlay.open { opacity: 1; visibility: visible; }

    .modal-card {
      background: var(--danger-bg);
      border: 1px solid var(--danger-border);
      border-radius: var(--radius);
      padding: 24px;
      width: min(90%, 320px);
      text-align: center;
      box-shadow: 0 12px 32px rgba(220, 38, 38, 0.15);
      transform: scale(0.95); transition: var(--transition);
    }
    .modal-overlay.open .modal-card { transform: scale(1); }

    .modal-card h2 { color: var(--danger); margin-bottom: 8px; font-size: 1.15rem; font-weight: 600; }
    .modal-card p { color: #991b1b; margin-bottom: 20px; font-size: 0.9rem; }

    .modal-actions { display: flex; gap: 10px; justify-content: center; }
    .modal-btn {
      padding: 10px 18px; border-radius: 10px; border: none;
      font-weight: 500; font-size: 0.9rem; cursor: pointer; transition: var(--transition);
      flex: 1; max-width: 110px; font-family: inherit;
    }
    .btn-cancel { background: #f1f5f9; color: var(--text-main); }
    .btn-cancel:hover { background: #e2e8f0; }
    .btn-confirm { background: var(--danger); color: #fff; }
    .btn-confirm:hover { background: #b91c1c; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .top-bar { height: 56px; }
      .header-title { display: none; }
      .menu-dropdown { width: calc(100vw - 32px); left: 50%; transform: translateX(-50%) translateY(-8px); }
      .menu-dropdown.open { transform: translateX(-50%) translateY(0); }
      .chat-filter { width: calc(100% - 24px); bottom: 16px; }
      .iframe-header h3 { font-size: 1rem; }
    }
    @media (max-width: 380px) {
      .logout-btn { padding: 6px 12px; font-size: 0.85rem; }
      .menu-btn { padding: 6px 10px; font-size: 0.85rem; }
      .content-card { padding: 18px 14px; min-height: 110px; }
      .content-card h3 { font-size: 1.05rem; }
    }
  </style>
</head>
<body>

  <header class="top-bar">
    <div class="header-left">
      <button class="menu-btn" id="menuBtn">Menú</button>
      <span class="header-title">Protocolo de Actuación Judicial</span>
      <nav class="menu-dropdown" id="menuDropdown">
        <button class="menu-item" data-key="atencion_publico">Cómo atender al público</button>
        <button class="menu-item" data-key="documentos_previos">Qué revisar antes de empezar</button>
        <button class="menu-item" data-key="subrogacion">Cuando alguien no está: subrogación</button>
        <button class="menu-item" data-key="antes_tramitar">Antes de mover un expediente</button>
        <button class="menu-item" data-key="escribir_documentos">Cómo escribir documentos: Escritos</button>
        <button class="menu-item" data-key="opiniones_tecnicas">Cómo dar opinión técnica: Dictamen</button>
        <button class="menu-item" data-key="leyes_utiles">Leyes que vas a usar</button>
        <button class="menu-item" data-key="situaciones_especiales">Situaciones que requieren atención especial</button>
        <button class="menu-item" data-key="plazos_vencimientos">Plazos y Vencimientos</button>
        <button class="menu-item" data-key="modelos_usar">Modelos para usar</button>
      </nav>
    </div>
    <button class="logout-btn" id="btnLogout">Salir</button>
  </header>

  <main class="main-content" id="mainContent">
    <div class="welcome-banner" id="welcomeBanner">
      <h2>Hola, Defensoría Oficial.<br>Seleccioná un tema para ver el contenido completo.</h2>
    </div>
    <div id="dynamicContainer"></div>
  </main>

  <!-- FILTRO INFERIOR: SIEMPRE VISIBLE -->
  <div class="chat-filter" id="filterBar">
    <input type="text" id="filterInput" placeholder="Buscar tema..." autocomplete="off">
    <button id="filterBtn">Buscar</button>
  </div>

  <div class="modal-overlay" id="logoutModal" role="dialog" aria-modal="true">
    <div class="modal-card">
      <h2>¿Cerrar sesión?</h2>
      <p>Se perderán los filtros activos. Puedes volver a entrar cuando lo necesites.</p>
      <div class="modal-actions">
        <button class="modal-btn btn-cancel" id="btnCancelLogout">Cancelar</button>
        <button class="modal-btn btn-confirm" id="btnConfirmLogout">Confirmar</button>
      </div>
    </div>
  </div>

  <script>
    // ========== MAPA DE URLS (Editable) ==========
    const externalUrls = {
      atencion_publico: "publico.html",        // archivo local o URL real
      documentos_previos: "",
      subrogacion: "",
      antes_tramitar: "",
      escribir_documentos: "",
      opiniones_tecnicas: "",
      leyes_utiles: "",
      situaciones_especiales: "",
      plazos_vencimientos: "",
      modelos_usar: ""
    };

    // Elementos DOM
    const mainContent = document.getElementById('mainContent');
    const dynamicContainer = document.getElementById('dynamicContainer');
    const filterBar = document.getElementById('filterBar');
    const filterInput = document.getElementById('filterInput');
    const filterBtn = document.getElementById('filterBtn');
    const menuBtn = document.getElementById('menuBtn');
    const menuDropdown = document.getElementById('menuDropdown');
    const logoutBtn = document.getElementById('btnLogout');
    const logoutModal = document.getElementById('logoutModal');
    const btnCancel = document.getElementById('btnCancelLogout');
    const btnConfirm = document.getElementById('btnConfirmLogout');
    const welcomeBanner = document.getElementById('welcomeBanner');

    let currentIframeActive = false;

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    // Cerrar vista detallada y volver al grid (el filtro permanece visible)
    function closeIframeView() {
      if (!currentIframeActive) return;
      
      rebuildGrid();
      // El filtro nunca se ocultó, solo aseguramos que el banner vuelva a mostrarse
      welcomeBanner.classList.remove('hide-banner');
      
      // Reaplicar filtro actual para mantener coherencia en el grid
      if (filterInput.value.trim() !== "") {
        applyFilter();
      }
      
      currentIframeActive = false;
    }
    
    // Construir el grid principal
    function rebuildGrid() {
      const gridHtml = `
        <div class="content-grid" id="contentGrid">
          <article class="content-card" data-key="atencion_publico" data-keywords="atencion publico trato personas paciencia escucha activa">
            <h3>Cómo atender al público</h3>
          </article>
          <article class="content-card" data-key="documentos_previos" data-keywords="documentos previos revisar papeles checklist legajo">
            <h3>Qué revisar antes de empezar</h3>
          </article>
          <article class="content-card" data-key="subrogacion" data-keywords="subrogación suplencia ausencia temporal reemplazo">
            <h3>Cuando alguien no está: Subrogación</h3>
          </article>
          <article class="content-card" data-key="antes_tramitar" data-keywords="antes de tramitar revisar expediente competencia firmas">
            <h3>Antes de mover un expediente</h3>
          </article>
          <article class="content-card" data-key="escribir_documentos" data-keywords="escribir documentos claros simples estructura redacción">
            <h3>Cómo escribir documentos: Escritos</h3>
          </article>
          <article class="content-card" data-key="opiniones_tecnicas" data-keywords="opiniones tecnicas analisis conclusiones fundamentar dictamen">
            <h3>Cómo dar opinión técnica: Dictamen</h3>
          </article>
          <article class="content-card" data-key="leyes_utiles" data-keywords="leyes utiles normas consulta rapida codigos">
            <h3>Leyes que vas a usar</h3>
          </article>
          <article class="content-card" data-key="situaciones_especiales" data-keywords="situaciones especiales urgencias excepciones vulnerabilidad">
            <h3>Situaciones que requieren atención especial</h3>
          </article>
          <article class="content-card" data-key="plazos_vencimientos" data-keywords="plazos vencimientos fechas caducidad términos perentorio cómputo">
            <h3>Plazos y Vencimientos</h3>
          </article>
          <article class="content-card" data-key="modelos_usar" data-keywords="modelos formatos plantillas ejemplos documentos escritos redacción">
            <h3>Modelos para usar</h3>
          </article>
        </div>
      `;
      dynamicContainer.innerHTML = gridHtml;
      attachCardEvents();
    }
    
    function attachCardEvents() {
      const cards = document.querySelectorAll('.content-card');
      cards.forEach(card => {
        card.removeEventListener('click', cardClickHandler);
        card.addEventListener('click', cardClickHandler);
      });
    }
    
    function cardClickHandler(e) {
      const card = e.currentTarget;
      const key = card.dataset.key;
      const title = card.querySelector('h3')?.innerText || "Protocolo";
      if (key && externalUrls.hasOwnProperty(key)) {
        showFullContent(key, title);
      } else {
        showFullContent('atencion_publico', title);
      }
    }
    
    // Mostrar contenido (iframe o mensaje) manteniendo el filtro visible
    function showFullContent(key, title) {
      const url = externalUrls[key];
      const hasValidUrl = url && url.trim() !== "";
      
      // Ocultar el banner de bienvenida para maximizar espacio, pero NO ocultamos el filtro
      welcomeBanner.classList.add('hide-banner');
      
      // Limpiar contenedor y crear panel de visualización completa
      dynamicContainer.innerHTML = '';
      
      const panel = document.createElement('div');
      panel.className = 'iframe-panel';
      
      if (hasValidUrl) {
        panel.innerHTML = `
          <div class="iframe-header">
            <h3>${escapeHtml(title)}</h3>
            <button class="back-btn" id="closeIframeBtn">← Volver a temas</button>
          </div>
          <div class="iframe-container">
            <iframe src="${escapeHtml(url)}" title="${escapeHtml(title)}" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
          </div>
        `;
      } else {
        panel.innerHTML = `
          <div class="iframe-header">
            <h3>${escapeHtml(title)}</h3>
            <button class="back-btn" id="closeIframeBtn">← Volver a temas</button>
          </div>
          <div class="preparation-message">
            <div class="preparation-message-content">
              <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/>
                <line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
              <h3>Contenido en preparación</h3>
              <p>Próximamente estará disponible el material para <strong>${escapeHtml(title)}</strong>. Por favor, consulte más tarde o coordine con el área de sistemas.</p>
            </div>
          </div>
        `;
      }
      
      dynamicContainer.appendChild(panel);
      currentIframeActive = true;
      
      // Evento para el botón volver
      const closeBtn = document.getElementById('closeIframeBtn');
      if (closeBtn) {
        closeBtn.addEventListener('click', closeIframeView);
      }
    }
    
    // Filtro de búsqueda (solo afecta al grid cuando está visible)
    function applyFilter() {
      const grid = document.getElementById('contentGrid');
      if (!grid) return; // Solo si la cuadrícula está presente
      
      const query = filterInput.value.toLowerCase().trim();
      const cards = document.querySelectorAll('.content-card');
      let visibleCount = 0;
      
      cards.forEach(card => {
        const title = card.querySelector('h3').textContent.toLowerCase();
        const keywords = card.dataset.keywords ? card.dataset.keywords.toLowerCase() : '';
        const match = !query || title.includes(query) || keywords.includes(query);
        card.classList.toggle('hidden', !match);
        if (match) visibleCount++;
      });
      
      let noResultsMsg = document.getElementById('noResultsMsg');
      if (visibleCount === 0 && query) {
        if (!noResultsMsg) {
          noResultsMsg = document.createElement('p');
          noResultsMsg.id = 'noResultsMsg';
          noResultsMsg.style.textAlign = 'center';
          noResultsMsg.style.color = 'var(--text-sec)';
          noResultsMsg.style.marginTop = '20px';
          noResultsMsg.style.fontSize = '0.9rem';
          noResultsMsg.textContent = 'No se encontró el tema. Prueba con otras palabras o consulta a un compañero.';
          grid.after(noResultsMsg);
        }
      } else if (noResultsMsg) {
        noResultsMsg.remove();
      }
    }
    
    // Eventos del menú
    function attachMenuEvents() {
      const menuItems = document.querySelectorAll('.menu-item');
      menuItems.forEach(item => {
        item.removeEventListener('click', menuClickHandler);
        item.addEventListener('click', menuClickHandler);
      });
    }
    
    function menuClickHandler(e) {
      e.stopPropagation();
      const target = e.currentTarget;
      const key = target.dataset.key;
      const title = target.innerText.trim();
      if (key && externalUrls.hasOwnProperty(key)) {
        showFullContent(key, title);
        menuDropdown.classList.remove('open');
      } else {
        showFullContent('atencion_publico', title);
        menuDropdown.classList.remove('open');
      }
    }
    
    // Inicialización
    function init() {
      rebuildGrid();
      // El filtro ya está visible por defecto (sin clase hidden)
      welcomeBanner.classList.remove('hide-banner');
      filterInput.value = '';
      applyFilter();
      currentIframeActive = false;
      
      // Eventos filtro
      filterInput.addEventListener('input', applyFilter);
      filterBtn.addEventListener('click', applyFilter);
      
      // Menú desplegable
      menuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        menuDropdown.classList.toggle('open');
      });
      document.addEventListener('click', (e) => {
        if (!menuDropdown.contains(e.target) && e.target !== menuBtn) {
          menuDropdown.classList.remove('open');
        }
      });
      attachMenuEvents();
      
      // Logout
      logoutBtn.addEventListener('click', () => logoutModal.classList.add('open'));
      btnCancel.addEventListener('click', () => logoutModal.classList.remove('open'));
      btnConfirm.addEventListener('click', () => {
        window.location.href = 'index.html';
      });
      logoutModal.addEventListener('click', (e) => {
        if (e.target === logoutModal) logoutModal.classList.remove('open');
      });
      
      // Tecla ESC: cierra la vista detallada si está activa
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          if (currentIframeActive) {
            closeIframeView();
          }
          logoutModal.classList.remove('open');
          menuDropdown.classList.remove('open');
        }
      });
    }
    
    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
